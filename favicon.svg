<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="60%" stop-color="#1565FF"/>
      <stop offset="100%" stop-color="#003ABA"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40DFFF"/>
      <stop offset="100%" stop-color="#1060FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: deep dark navy -->
  <rect width="32" height="32" rx="3" fill="#04070F"/>

  <g filter="url(#glow)">

    <!-- LEFT WING — main sweep from body outward and up -->
    <path d="
      M15 15
      C13 13 10 10 7 8
      C5 7 3 7 2 8
      C1 9 2 11 4 12
      C6 13 9 12 11 11
      C13 10 14 12 15 15Z
    " fill="url(#wing)" opacity="0.95"/>

    <!-- Left wing feather lines -->
    <path d="M15 15 C12 12 8 9 4 9" stroke="#60E8FF" stroke-width="0.4" fill="none" opacity="0.6"/>
    <path d="M15 15 C11 11 7 9 3 10" stroke="#60E8FF" stroke-width="0.3" fill="none" opacity="0.4"/>

    <!-- LEFT WING TIP — crescent horn curling back -->
    <path d="
      M2 8
      C1 5 2 3 4 4
      C5 4 6 5 5 7
      C4 8 3 8 2 8Z
    " fill="#00CFFF" opacity="0.9"/>

    <!-- RIGHT WING — mirror -->
    <path d="
      M17 15
      C19 13 22 10 25 8
      C27 7 29 7 30 8
      C31 9 30 11 28 12
      C26 13 23 12 21 11
      C19 10 18 12 17 15Z
    " fill="url(#wing)" opacity="0.95"/>

    <!-- Right wing feather lines -->
    <path d="M17 15 C20 12 24 9 28 9" stroke="#60E8FF" stroke-width="0.4" fill="none" opacity="0.6"/>
    <path d="M17 15 C21 11 25 9 29 10" stroke="#60E8FF" stroke-width="0.3" fill="none" opacity="0.4"/>

    <!-- RIGHT WING TIP — crescent horn -->
    <path d="
      M30 8
      C31 5 30 3 28 4
      C27 4 26 5 27 7
      C28 8 29 8 30 8Z
    " fill="#00CFFF" opacity="0.9"/>

    <!-- BODY — central torso -->
    <ellipse cx="16" cy="15" rx="2.2" ry="2.8" fill="url(#body)"/>

    <!-- HEAD — small, angled right like the logo -->
    <ellipse cx="17.5" cy="11.5" rx="1.8" ry="1.6" fill="#40DFFF"/>

    <!-- BEAK -->
    <path d="M19 11.2 L21 12 L19 12.5Z" fill="#00CFFF"/>

    <!-- NECK connecting head to body -->
    <path d="M16.5 13 C16.8 12.5 17.2 12 17.5 11.5" stroke="#40DFFF" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- TAIL FEATHERS — flowing down, 3 strands like the logo -->
    <path d="M15 17 C14 20 12 23 11 27" stroke="url(#body)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <path d="M16 18 C16 21 15.5 24 15 28" stroke="#40DFFF" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M17 17 C18 20 20 23 21 27" stroke="url(#body)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Tail inner highlight lines -->
    <path d="M15.5 18 C15 21 14.5 24 14 27" stroke="#60E8FF" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M16.5 18 C17 21 17.5 24 18 27" stroke="#60E8FF" stroke-width="0.4" fill="none" opacity="0.5"/>

  </g>
</svg>
