<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PhoennixAI — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  body{font-family:"Inter",sans-serif;background:#0a0f1a;color:#e2e8f0}
  input{font-family:"Inter",sans-serif}
  .glow-teal{box-shadow:0 0 18px rgba(126,206,196,0.25)}
  .btn-primary{background:linear-gradient(135deg,#7ECEC4,#38BDF8);transition:opacity .2s}
  .btn-primary:hover{opacity:.88}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .5s ease forwards}
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <!-- Background grid -->
  <div class="fixed inset-0 pointer-events-none" style="background-image:linear-gradient(rgba(126,206,196,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(126,206,196,.04) 1px,transparent 1px);background-size:40px 40px"></div>

  <div class="relative w-full max-w-md fade-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="PhoennixAI.jpg" alt="PhoennixAI" class="w-16 h-16 rounded-2xl mx-auto mb-4 object-cover"/>
      <h1 class="text-2xl font-bold tracking-tight" style="color:#7ECEC4">PhoennixAI</h1>
      <p class="text-sm text-slate-400 mt-1">Mission Control — Beta Access</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl border border-slate-700/60 p-8 glow-teal" style="background:rgba(15,23,42,.85);backdrop-filter:blur(12px)">
      <h2 class="text-lg font-semibold text-slate-100 mb-6">Sign in to your account</h2>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="mb-4">
          <label class="block text-xs font-medium text-slate-400 mb-1.5" for="email">Email address</label>
          <input id="email" type="email" required placeholder="you@example.com"
            class="w-full rounded-lg px-4 py-2.5 text-sm bg-slate-800/70 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-teal-400 transition-colors"/>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-medium text-slate-400 mb-1.5" for="password">Password</label>
          <input id="password" type="password" required placeholder="••••••••"
            class="w-full rounded-lg px-4 py-2.5 text-sm bg-slate-800/70 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-teal-400 transition-colors"/>
        </div>

        <div id="errorMsg" class="hidden mb-4 rounded-lg p-3 text-xs text-red-300 bg-red-900/30 border border-red-700/40"></div>

        <button type="submit" id="submitBtn"
          class="btn-primary w-full rounded-lg py-2.5 text-sm font-semibold text-slate-900">
          Sign In
        </button>
      </form>

      <div class="mt-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-slate-700"></div>
        <span class="text-xs text-slate-500">or</span>
        <div class="flex-1 h-px bg-slate-700"></div>
      </div>

      <p class="text-center text-xs text-slate-500 mt-5">
        Don't have access?
        <a href="PhoennixAI_BetaWaitlist_Landing.html" class="text-teal-400 hover:underline ml-1">Join the beta waitlist</a>
      </p>
    </div>

    <!-- Agent dots -->
    <div class="flex justify-center gap-4 mt-6 flex-wrap">
      <span class="flex items-center gap-1.5 text-xs"><span class="w-1.5 h-1.5 rounded-full" style="background-color:#7ECEC4;box-shadow:0 0 5px #7ECEC4"></span><span class="text-slate-500">NEXUS</span></span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-1.5 h-1.5 rounded-full" style="background-color:#84CC16;box-shadow:0 0 5px #84CC16"></span><span class="text-slate-500">PROBE</span></span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-1.5 h-1.5 rounded-full" style="background-color:#00E5FF;box-shadow:0 0 5px #00E5FF"></span><span class="text-slate-500">ECHO</span></span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-1.5 h-1.5 rounded-full" style="background-color:#38BDF8;box-shadow:0 0 5px #38BDF8"></span><span class="text-slate-500">SIGNAL</span></span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-1.5 h-1.5 rounded-full" style="background-color:#FB923C;box-shadow:0 0 5px #FB923C"></span><span class="text-slate-500">FORGE</span></span>
    </div>

    <p class="text-center text-xs text-slate-600 mt-4">&copy; 2025 PhoennixAI. All rights reserved.</p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errorMsg.classList.add('hidden');

      if (!email || !password) {
        errorMsg.textContent = 'Please enter your email and password.';
        errorMsg.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      // Redirect to dashboard after brief delay
      setTimeout(() => {
        window.location.href = 'PhoennixAI_BetaDashboard.html';
      }, 900);
    }
  </script>
</body>
</html>
